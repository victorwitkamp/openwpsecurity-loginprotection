name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: Audit Composer dependencies
        run: composer audit --locked

      - name: Build admin CSS
        run: npm run build:css

      - name: Verify compiled CSS is current
        run: git diff --exit-code -- assets/css

      - name: Run PHPCS
        run: composer phpcs

      - name: Run PHP lint
        run: find . -path './vendor' -prune -o -path './node_modules' -prune -o -name '*.php' -print0 | xargs -0 -n 1 php -l

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="${GITHUB_REF_NAME#v}"
          plugin_version="$(sed -n 's/^ \* Version:[[:space:]]*//p' openwpsecurity-loginprotection.php | xargs)"
          stable_tag="$(sed -n 's/^Stable tag:[[:space:]]*//p' readme.txt | xargs)"
          package_version="$(node -p "require('./package.json').version")"
          test "$version" = "$plugin_version"
          test "$version" = "$stable_tag"
          test "$version" = "$package_version"

      - name: Install production Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare release package
        run: |
          mkdir -p dist/openwpsecurity-loginprotection
          rsync -av --exclude-from='.distignore' ./ dist/openwpsecurity-loginprotection/
          test -f dist/openwpsecurity-loginprotection/vendor/autoload.php
          test -f dist/openwpsecurity-loginprotection/openwpsecurity-loginprotection.php
          test -f dist/openwpsecurity-loginprotection/readme.txt
          test ! -e dist/openwpsecurity-loginprotection/composer.json
          test ! -e dist/openwpsecurity-loginprotection/assets/scss
          cd dist
          zip -r ../openwpsecurity-loginprotection.zip openwpsecurity-loginprotection

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwpsecurity-loginprotection
          path: openwpsecurity-loginprotection.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: openwpsecurity-loginprotection.zip
