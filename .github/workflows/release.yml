name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Build admin CSS
        run: npm run build:css

      - name: Prepare release package
        run: |
          mkdir -p dist/openwpsecurity-loginprotection
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            ./ dist/openwpsecurity-loginprotection/
          cd dist
          zip -r ../openwpsecurity-loginprotection.zip openwpsecurity-loginprotection

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwpsecurity-loginprotection
          path: openwpsecurity-loginprotection.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: openwpsecurity-loginprotection.zip
